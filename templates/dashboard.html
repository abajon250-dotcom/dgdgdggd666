{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="grid">
    <div class="card"><h3>Пользователи</h3><h1>1240</h1></div>
    <div class="card"><h3>Заявки</h3><h1>320</h1></div>
    <div class="card"><h3>Доход</h3><h1>$540</h1></div>
    <div class="card"><h3>Тикеты</h3><h1>12</h1></div>
</div>

<div class="card" style="margin-top:20px;">
    <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
        labels: ['00','04','08','12','16','20'],
        datasets: [{
            label: 'Заявки',
            data: [10,25,18,40,22,30],
            borderColor: '#7c3aed'
        }]
    }
});
</script>

{% endblock %}
