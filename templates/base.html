<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}eSIM Admin{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0b0f1a, #020617);
            color: #fff;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(124,58,237,0.3);
            padding: 25px 20px;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(45deg, #a855f7, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 35px;
        }
        .menu-title {
            font-size: 10px;
            letter-spacing: 1.5px;
            color: #64748b;
            margin: 20px 0 10px 12px;
        }
        .menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 5px;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.2s;
            font-size: 14px;
        }
        .menu a i { width: 22px; font-size: 1.1rem; }
        .menu a:hover { background: #1e293b; color: white; transform: translateX(5px); }
        .menu a.active { background: linear-gradient(90deg, #7c3aed, #6366f1); color: white; box-shadow: 0 4px 12px rgba(124,58,237,0.4); }
        .main { flex: 1; padding: 25px 30px; overflow-y: auto; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-refresh { background: #1e293b; border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; transition: 0.2s; }
        .btn-refresh:hover { background: #7c3aed; transform: scale(1.02); }
        .card { background: rgba(17,24,39,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(124,58,237,0.2); border-radius: 24px; padding: 20px; transition: 0.2s; }
        .card:hover { border-color: #7c3aed; transform: translateY(-3px); }
        .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 30px; }
        .stat-icon { font-size: 28px; color: #7c3aed; margin-bottom: 10px; }
        .stat-info p { font-size: 12px; color: #94a3b8; letter-spacing: 0.5px; }
        .stat-info h3 { font-size: 28px; font-weight: 700; margin-top: 5px; }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-card { padding: 20px; }
        .period-buttons { display: flex; gap: 10px; margin: 15px 0; }
        .period-btn { background: #1e293b; border: none; padding: 5px 12px; border-radius: 30px; color: #cbd5e1; cursor: pointer; font-size: 12px; }
        .period-btn.active { background: #7c3aed; color: white; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .notifications-list { margin-top: 15px; }
        .notification-item { padding: 12px 0; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; font-size: 13px; }
        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .actions-grid button { background: #1e293b; border: none; padding: 10px; border-radius: 12px; color: white; cursor: pointer; transition: 0.2s; }
        .actions-grid button:hover { background: #7c3aed; transform: translateY(-2px); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid #1e293b; font-weight: 500; }
        td { padding: 12px; border-bottom: 1px solid #1e293b; }
        .status { padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status.new, .status.pending { background: #f59e0b20; color: #f59e0b; }
        .status.accepted { background: #10b98120; color: #10b981; }
        .status.rejected { background: #ef444420; color: #ef4444; }
        .btn-sm { background: #7c3aed; border: none; padding: 5px 12px; border-radius: 30px; color: white; cursor: pointer; font-size: 12px; }
        @media (max-width:1000px) { .sidebar { width:80px; padding:15px; } .sidebar .logo, .sidebar .menu-title, .sidebar a span { display:none; } .sidebar a { justify-content:center; } .stat-grid { grid-template-columns:1fr 1fr; } .charts-row, .two-columns { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">⚡ eSIM Admin</div>
    <div class="menu">
        <div class="menu-title">ГЛАВНОЕ</div>
        <a href="/dashboard"><i class="fas fa-chart-line"></i><span> Дашборд</span></a>
        <a href="/submissions"><i class="fas fa-file-alt"></i><span> Заявки</span></a>
        <a href="/users"><i class="fas fa-users"></i><span> Пользователи</span></a>
        <a href="/tickets"><i class="fas fa-ticket-alt"></i><span> Тикеты</span></a>
        <a href="/operators"><i class="fas fa-tower-cell"></i><span> Операторы</span></a>
        <a href="/blacklist"><i class="fas fa-ban"></i><span> Чёрный список</span></a>
        <a href="/broadcast"><i class="fas fa-bullhorn"></i><span> Рассылка</span></a>
        <a href="/analytics"><i class="fas fa-chart-simple"></i><span> Аналитика</span></a>
        <a href="/stats"><i class="fas fa-chart-pie"></i><span> Статистика</span></a>
        <a href="/reports"><i class="fas fa-file-invoice"></i><span> Отчёты</span></a>
        <a href="/achievements"><i class="fas fa-medal"></i><span> Ачивки и уровни</span></a>
        <div class="menu-title" style="margin-top:30px;">НАСТРОЙКИ</div>
        <a href="/settings"><i class="fas fa-cog"></i><span> Настройки</span></a>
        <a href="/workers"><i class="fas fa-users-gear"></i><span> Работники</span></a>
        <a href="/logs"><i class="fas fa-history"></i><span> Логи и мониторинг</span></a>
        <a href="/audit-log"><i class="fas fa-shield"></i><span> Аудит</span></a>
        <a href="/api-keys"><i class="fas fa-key"></i><span> API-ключи</span></a>
        <a href="/subscriptions"><i class="fas fa-credit-card"></i><span> Подписки</span></a>
        <a href="/withdraw-requests"><i class="fas fa-money-bill-wave"></i><span> Заявки на вывод</span></a>
        <a href="/logout" style="color:#f87171;"><i class="fas fa-sign-out-alt"></i><span> Выйти</span></a>
    </div>
</div>
<div class="main">
    <div class="top-bar">
        <div id="current-time"></div>
        <button class="btn-refresh" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Обновить данные</button>
    </div>
    {% block content %}{% endblock %}
</div>
<script>
    function updateTime() { document.getElementById('current-time').innerText = new Date().toLocaleString('ru-RU'); }
    updateTime(); setInterval(updateTime, 1000);
</script>
</body>
</html>
