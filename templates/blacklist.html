{% extends "base.html" %}
{% block title %}Чёрный список{% endblock %}
{% block content %}
<div class="glass table-container">
    <div class="top-bar-inline">
        <h4>🚫 ЧЁРНЫЙ СПИСОК</h4>
        <form method="post" action="/blacklist/add" class="inline-form">
            <input type="text" name="phone" placeholder="Номер телефона" required>
            <button type="submit" class="btn-primary">Добавить</button>
        </form>
    </div>
    <table>
        <thead><tr><th>Номер</th><th>Дата добавления</th><th>Действие</th></tr></thead>
        <tbody>
            {% for item in blacklist %}
            <tr>
                <td><code>{{ item.phone }}</code></td>
                <td>{{ item.created_at.strftime('%d.%m.%Y %H:%M') if item.created_at else '' }}</td>
                <td>
                    <form method="post" action="/blacklist/remove" style="display:inline;">
                        <input type="hidden" name="phone" value="{{ item.phone }}">
                        <button type="submit" class="action-btn reject"><i class="fas fa-trash-alt"></i></button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
