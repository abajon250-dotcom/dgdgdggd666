<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM Admin – Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f111a 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass {
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(28, 34, 48, 0.8);
            border-radius: 32px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(45deg, #4e73df, #224abe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }
        .subtitle {
            color: #858796;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #858796;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #4e73df;
            box-shadow: 0 0 0 2px rgba(78,115,223,0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #4e73df, #224abe);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78,115,223,0.4);
        }
        .footer-note {
            margin-top: 30px;
            font-size: 12px;
            color: #858796;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }
        .error {
            background: rgba(231,74,59,0.2);
            color: #e74a3b;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-container glass">
        <div class="logo">⚡ eSIM Admin</div>
        <h1>Вход в панель</h1>
        <p class="subtitle">Введите ваш Telegram ID (администратора)</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/auth">
            <div class="input-group">
                <label><i class="fas fa-id-card"></i> Telegram ID</label>
                <input type="number" name="user_id" placeholder="Например, 123456789" required autofocus>
            </div>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Войти</button>
        </form>

        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> Только для администраторов
        </div>
    </div>
</body>
</html>
