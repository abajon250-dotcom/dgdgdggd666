{% extends "base.html" %}
{% block title %}Работники{% endblock %}
{% block content %}
<div class="glass table-container">
    <div class="top-bar-inline">
        <h4>👔 РАБОТНИКИ</h4>
        <form method="post" action="/workers/add" class="inline-form">
            <input type="number" name="user_id" placeholder="ID пользователя" required>
            <input type="text" name="permissions" placeholder="Права (опционально)">
            <button type="submit" class="btn-primary">Добавить</button>
        </form>
    </div>
    <table>
        <thead><tr><th>ID</th><th>Username</th><th>Права</th><th>Действие</th></tr></thead>
        <tbody>
            {% for w in workers %}
            <tr>
                <td>{{ w.user_id }}</td>
                <td>@{{ w.username }}</td>
                <td>{{ w.permissions or 'по умолчанию' }}</td>
                <td>
                    <form method="post" action="/workers/remove" style="display:inline;">
                        <input type="hidden" name="user_id" value="{{ w.user_id }}">
                        <button type="submit" class="action-btn reject"><i class="fas fa-user-minus"></i></button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
