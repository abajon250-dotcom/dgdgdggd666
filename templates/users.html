{% extends "base.html" %}

{% block content %}

<div class="card">

<input placeholder="Поиск..." oninput="search(this.value)">

<table id="users">
    <tr><th>ID</th><th>Имя</th><th>Действия</th></tr>
    <tr><td>1</td><td>@user1</td><td><button onclick="approve()">✔</button><button onclick="reject()">✖</button></td></tr>
    <tr><td>2</td><td>@user2</td><td><button onclick="approve()">✔</button><button onclick="reject()">✖</button></td></tr>
</table>

</div>

<script>
function search(q){
    document.querySelectorAll("#users tr").forEach(r=>{
        r.style.display = r.innerText.includes(q) ? "" : "none";
    });
}

function approve(){
    showToast("Принято");
}

function reject(){
    showToast("Отклонено");
}
</script>

{% endblock %}
