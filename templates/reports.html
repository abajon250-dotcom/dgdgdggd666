{% extends "base.html" %}
{% block page %}Отчёты{% endblock %}

{% block content %}
<div class="card">
    <h3>📊 Генерация отчётов</h3>
    <form method="post" action="/reports/generate" target="_blank">
        <div class="form-group mb-3">
            <label>Тип отчёта</label>
            <select name="report_type" class="form-control" style="background:#020617; color:white; border:1px solid #334155; border-radius:8px; padding:8px;">
                <option value="users">Пользователи (CSV)</option>
                <option value="submissions">Заявки за 30 дней (CSV)</option>
                <option value="financial">Финансовая сводка (CSV)</option>
            </select>
        </div>
        <button type="submit" class="btn">Скачать отчёт</button>
    </form>
</div>
{% endblock %}
