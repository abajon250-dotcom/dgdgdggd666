<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}eSIM Admin{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b0f1a, #020617);
            color: #ffffff;
            display: flex;
            min-height: 100vh;
        }
        /* Сайдбар с неоном */
        .sidebar {
            width: 280px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(124, 58, 237, 0.3);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
            padding: 25px;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, #a855f7, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 35px;
            text-shadow: 0 0 8px rgba(168,85,247,0.5);
        }
        .menu a {
            display: block;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.2s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu a i { width: 24px; }
        .menu a:hover {
            background: rgba(168,85,247,0.2);
            transform: translateX(6px);
            color: #fff;
        }
        .menu a.active {
            background: linear-gradient(90deg, #7c3aed, #6366f1);
            color: white;
            box-shadow: 0 4px 12px rgba(124,58,237,0.4);
        }
        /* Основной контент */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Карточки */
        .card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(168,85,247,0.2);
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #7c3aed;
            box-shadow: 0 12px 28px rgba(124,58,237,0.3);
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stat-icon {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            background: rgba(124,58,237,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #a855f7;
        }
        .stat-info h3 { font-size: 28px; margin-bottom: 5px; }
        .stat-info p { color: #94a3b8; font-size: 13px; letter-spacing: 0.5px; }
        /* Таблица */
        .table-container { padding: 20px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #94a3b8; border-bottom: 1px solid #334155; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; transition: 0.1s; }
        tr:hover td { background: rgba(124,58,237,0.05); }
        .status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            display: inline-block;
        }
        .status.new, .status.pending { background: #f59e0b20; color: #f59e0b; }
        .status.accepted { background: #10b98120; color: #10b981; }
        .status.rejected { background: #ef444420; color: #ef4444; }
        .btn {
            background: linear-gradient(90deg, #7c3aed, #6366f1);
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 2px 12px rgba(124,58,237,0.5); }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">⚡ eSIM PRO</div>
    <div class="menu">
        <a href="/dashboard"><i class="fas fa-chart-line"></i> Дашборд</a>
        <a href="/submissions"><i class="fas fa-file-alt"></i> Заявки</a>
        <a href="/users"><i class="fas fa-users"></i> Пользователи</a>
        <a href="/tickets"><i class="fas fa-ticket-alt"></i> Тикеты</a>
        <a href="/operators"><i class="fas fa-tower-cell"></i> Операторы</a>
        <a href="/blacklist"><i class="fas fa-ban"></i> Чёрный список</a>
        <a href="/broadcast"><i class="fas fa-bullhorn"></i> Рассылка</a>
        <a href="/analytics"><i class="fas fa-chart-simple"></i> Аналитика</a>
        <a href="/stats"><i class="fas fa-chart-pie"></i> Статистика</a>
        <a href="/reports"><i class="fas fa-file-invoice"></i> Отчёты</a>
        <a href="/achievements"><i class="fas fa-medal"></i> Ачивки</a>
        <div style="margin-top: 30px;"><hr style="border-color:#334155;"></div>
        <a href="/settings"><i class="fas fa-cog"></i> Настройки</a>
        <a href="/workers"><i class="fas fa-users-gear"></i> Работники</a>
        <a href="/logs"><i class="fas fa-history"></i> Логи</a>
        <a href="/audit-log"><i class="fas fa-shield"></i> Аудит</a>
        <a href="/api-keys"><i class="fas fa-key"></i> API-ключи</a>
        <a href="/subscriptions"><i class="fas fa-credit-card"></i> Подписки</a>
        <a href="/logout" style="color: #f97316;"><i class="fas fa-sign-out-alt"></i> Выйти</a>
    </div>
</div>
<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div id="realtime-status">🟢 Онлайн</div>
        <button class="btn" onclick="location.reload()">🔄 Обновить</button>
    </div>
    {% block content %}{% endblock %}
</div>

<script>
    // WebSocket realtime
    const token = localStorage.getItem('access_token') || document.cookie.split('access_token=')[1];
    if (token) {
        const ws = new WebSocket(`ws://${window.location.host}/ws?token=${token}`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            showToast(`🔄 ${data.message || 'Новое событие'}`, 'info');
        };
        ws.onopen = () => console.log('WebSocket connected');
        ws.onerror = (e) => console.error('WS error', e);
    }
    function showToast(text, type='info') {
        let toast = document.createElement('div');
        toast.innerText = text;
        toast.style.cssText = `position:fixed; bottom:20px; right:20px; background:#1e293b; color:white; padding:12px 20px; border-radius:16px; z-index:9999; backdrop-filter:blur(8px); border-left:4px solid #7c3aed; animation: slideIn 0.3s ease;`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>
</body>
</html>
