{% extends "base.html" %}
{% block title %}Отчёты{% endblock %}
{% block content %}
<div class="glass" style="max-width: 500px;">
    <h4>📄 ГЕНЕРАЦИЯ ОТЧЁТА</h4>
    <form method="get" action="/reports/generate">
        <select name="report_type">
            <option value="daily">Ежедневный</option>
            <option value="weekly">Еженедельный</option>
            <option value="monthly">Ежемесячный</option>
            <option value="custom">Произвольный период</option>
        </select>
        <div id="customDateRange" style="display:none;">
            <input type="date" name="start_date"> — <input type="date" name="end_date">
        </div>
        <button type="submit" class="btn-primary">Сформировать CSV</button>
    </form>
</div>
<script>
    document.querySelector('select[name="report_type"]').addEventListener('change', function() {
        document.getElementById('customDateRange').style.display = this.value === 'custom' ? 'block' : 'none';
    });
</script>
{% endblock %}
