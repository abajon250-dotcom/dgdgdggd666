{% extends "base.html" %}
{% block title %}Операторы{% endblock %}
{% block content %}
<div class="glass table-container">
    <h4>📡 ОПЕРАТОРЫ</h4>
    <table>
        <thead><tr><th>Оператор</th><th>Цена ХОЛД</th><th>Цена БХ</th><th>Лимит слотов</th><th>Действия</th></tr></thead>
        <tbody>
            {% for op in operators %}
            <tr>
                <td><strong>{{ op.name }}</strong></td>
                <td>
                    <form method="post" action="/operators/price" class="inline-form">
                        <input type="hidden" name="operator" value="{{ op.name }}">
                        <input type="number" step="0.5" name="price_hold" value="{{ op.price_hold }}" class="price-input">
                        <input type="number" step="0.5" name="price_bh" value="{{ op.price_bh }}" class="price-input">
                        <button type="submit" class="action-btn accept"><i class="fas fa-save"></i></button>
                    </form>
                </td>
                <td>
                    <form method="post" action="/operators/slot" class="inline-form">
                        <input type="hidden" name="operator" value="{{ op.name }}">
                        <input type="number" name="slot_limit" value="{{ op.slot_limit }}" class="slot-input">
                        <button type="submit" class="action-btn accept"><i class="fas fa-save"></i></button>
                    </form>
                </td>
                <td>—</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
