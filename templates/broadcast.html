{% extends "base.html" %}
{% block title %}Рассылка{% endblock %}
{% block content %}
<div class="glass" style="max-width: 600px; margin: 0 auto;">
    <h4>📢 НОВАЯ РАССЫЛКА</h4>
    <form method="post" action="/broadcast/send">
        <textarea name="message" rows="5" placeholder="Текст сообщения..." required style="width:100%; background:#1e293b; color:white; border-radius:12px; padding:12px;"></textarea>
        <div class="form-group">
            <label>Целевая аудитория:</label>
            <select name="target">
                <option value="all">Все пользователи</option>
                <option value="user">Только пользователи</option>
                <option value="worker">Только работники</option>
                <option value="admin">Только администраторы</option>
            </select>
        </div>
        <button type="submit" class="btn-primary">Отправить</button>
    </form>
</div>
{% endblock %}
