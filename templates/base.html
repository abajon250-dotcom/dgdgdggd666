<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>{% block title %}Admin{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0b0f1a;
    --card: rgba(17,24,39,0.7);
    --accent: #7c3aed;
}

body {
    margin:0;
    font-family: 'Inter';
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    backdrop-filter: blur(20px);
    background: rgba(2,6,23,0.7);
    height:100vh;
    padding:20px;
    border-right:1px solid rgba(255,255,255,0.05);
}

.menu a {
    display:block;
    padding:12px;
    border-radius:10px;
    color:#94a3b8;
    text-decoration:none;
}

.menu a:hover {
    background:rgba(124,58,237,0.2);
}

.menu a.active {
    background:linear-gradient(90deg,#7c3aed,#6366f1);
}

/* MAIN */
.main {
    flex:1;
    padding:25px;
}

/* CARDS */
.card {
    background:var(--card);
    border-radius:16px;
    padding:20px;
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.05);
    transition:.3s;
}

.card:hover {
    transform:translateY(-5px);
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

/* TABLE */
table {
    width:100%;
    margin-top:10px;
}
tr {
    border-bottom:1px solid rgba(255,255,255,0.05);
}
td,th {
    padding:12px;
}

/* BUTTON */
.btn {
    background:linear-gradient(90deg,#7c3aed,#6366f1);
    border:none;
    padding:10px 15px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

/* INPUT */
input {
    background:#020617;
    border:none;
    padding:10px;
    border-radius:8px;
    color:white;
}

/* TOAST */
.toast {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111827;
    padding:15px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>⚡ PRO Admin</h2>
    <div class="menu">
        <a href="/dashboard">Dashboard</a>
        <a href="/users">Users</a>
        <a href="/tickets">Tickets</a>
        <a href="/stats">Stats</a>
    </div>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

<div id="toast" class="toast"></div>

<script>
function showToast(text){
    let t = document.getElementById('toast');
    t.innerText = text;
    t.style.display='block';
    setTimeout(()=>t.style.display='none',3000);
}
</script>

</body>
</html>
