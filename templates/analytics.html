{% extends "base.html" %}
{% block title %}Аналитика{% endblock %}
{% block content %}
<div class="glass chart-card">
    <h4>ДИНАМИКА ЗАЯВОК</h4>
    <canvas id="analyticsChart" height="300"></canvas>
</div>
<script>
    fetch('/api/analytics/daily?period=30d')
        .then(r => r.json())
        .then(data => {
            new Chart(document.getElementById('analyticsChart'), {
                type: 'line',
                data: {
                    labels: data.dates,
                    datasets: [{
                        label: 'Заявки',
                        data: data.submissions,
                        borderColor: '#4e73df',
                        backgroundColor: 'rgba(78,115,223,0.1)',
                        tension: 0.3,
                        fill: true
                    }]
                }
            });
        });
</script>
{% endblock %}
